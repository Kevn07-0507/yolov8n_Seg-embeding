version: '3.8'

services:
  crack-detection:
    build: .
    container_name: crack-detection-app
    ports:
      - "7860:7860"
    volumes:
      - ./crack-seg:/app/crack-seg
      - ./runs:/app/runs
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
    command: python web_app.py
    restart: unless-stopped

  # 可选：添加GPU支持
  crack-detection-gpu:
    build: .
    container_name: crack-detection-gpu
    ports:
      - "7861:7860"
    volumes:
      - ./crack-seg:/app/crack-seg
      - ./runs:/app/runs
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: python web_app.py
    restart: unless-stopped
